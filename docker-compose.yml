services:
  bunradio:
    build:
      context: .
      dockerfile: Dockerfile
    image: bunradio:latest
    container_name: bunradio
    restart: unless-stopped
    ports:
      # Expone el puerto HTTP mapeándolo dinámicamente con fallback a 4321
      - "${PORT:-4321}:${PORT:-4321}"
      # Expone el puerto RTMP para ingesta mapeándolo dinámicamente con fallback a 1935
      - "${RTMP_PORT:-1935}:${RTMP_PORT:-1935}"
    env_file:
      - .env
    volumes:
      # Monta la carpeta de música de fallback dinámicamente según la variable de entorno.
      # Por defecto, mapea la carpeta local './musica' a '/app/musica' dentro del contenedor.
      - ./${FALLBACK_SOURCE:-musica}:/app/${FALLBACK_SOURCE:-musica}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
